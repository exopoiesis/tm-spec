# Pilot TM-Spec artefact #2: pyrite V_S + H_i NEB SMOKE (endpoints only)
# PASS, paper-grade.
# Status: [DRAFT v0.2 — numbers from a prior campaign log]

spec: tm-spec/0.2
kind: NEBCalculation
id: tm.pyr.vs.hint.smoke.2026-04-29
schema_url: https://exopoiesis.github.io/tm-spec/0.2.json   # additive bump v0.1→v0.2

# ── 1. STRUCTURE ─────────────────────────────────────────
structure:
  formula: Fe32S63H1                        # post-defect: 96 atoms, 1 V_S + 1 H_i
  prototype: AB2_cP12_205_a_c               # AFLOW: pyrite cubic
  space_group: { number: 205, symbol: Pa-3 }
  cell:
    a: 5.418  Å                             # primitive
    angles: "[90, 90, 90] deg"              # quoted: YAML can't mix flow seq + scalar
  wyckoff:
    Fe@4a: [0.000, 0.000, 0.000]
    S@8c:  [0.385, 0.385, 0.385]            # u ≈ 0.385 (PBE-relaxed)
  supercell: [2, 2, 2]                      # 96 atoms total
  pbc: [true, true, true]
  ref: structures/pyr_96at_pristine.extxyz

# ── 2. DEFECTS (Kröger-Vink) ─────────────────────────────
defects:
  reactions:
    - "S_S^× → V_S^••  + S(removed)"        # sulfur vacancy
    - "nil   → H_i^•   + e'"                # interstitial proton
  charge_balance: |
    V_S^•• + 2·e' (delocalized) + H_i^•  →  net positive +1
    [NOTE] charged supercell — Makov-Payne correction applied (see paired_script)
  population:
    V_S:   { count: 1, conc: 1/64 }
    H_int: { count: 1, conc: 1/64, site: vacancy_neighbour }

# ── 3. MAGNETIC STATE ────────────────────────────────────
magnetic:
  state: NM                                 # pyrite is diamagnetic (low-spin Fe²⁺ d⁶, octahedral)
  collinear: true
  propagation_vector: [0, 0, 0]
  magmoms_uB: {}                            # all zero by physics
  surrogate_warning: null                   # NM is physically correct, not a surrogate

# ── 4. ENVIRONMENT ───────────────────────────────────────
environment:
  phase: bulk_solid_with_vacancy_proton
  T: 363.15 K                               # implied hydrothermal thermodynamic context
  P: 100 bar
  pH: 6.0
  redox: { Eh: -0.40 V_SHE, pe: -6.8 }
  composition_molal:
    Fe(2): 1.0e-3
    S(-2): 5.0e-4
    Na: 0.5
    Cl: 0.5
  database: phreeqc/llnl.dat
  saturation_targets:
    pyrite: equilibrium

# ── 5. REACTION NETWORK (target reaction for full NEB) ───
reactions:
  - id: R_VS_proton_hop
    label: "V_S-mediated proton hop"
    rule:  "H_i^•(site_A) + V_S^••(neighbour) → H_i^•(site_B) + V_S^••(shifted)"
    rate:  "TBD — needs full NEB (this artefact is endpoints-only smoke)"
    Ea_eV: null                              # not yet computed (smoke stage)

# ── 6. CALCULATION ───────────────────────────────────────
calculation:
  method: DFT
  level:
    xc: PBE+D3(BJ)
    basis: { kind: plane_waves, cutoff_Ry: 60, rho_cutoff_Ry: 240 }    # script default
    pseudopotential: ONCV-SR PBE Pseudo Dojo nc-sr-04
    smearing: { kind: gaussian, width_Ry: 0.005 }                       # V_S+H endpoint odd electrons
    # NOMAD/LibXC interop
    xc_libxc: [GGA_X_PBE, GGA_C_PBE]
    vdw: D3-BJ
    spin: none                               # nspin=1 (pyrite NM)
    # hubbard: omitted — pyrite NM, no U (sensitivity reported in SI)
  k_points: { mesh: [2, 2, 2], shift: [0, 0, 0] }   # default for 2×2×2 conv supercell
  convergence:
    scf_Ry:        1.0e-8
    fmax_eV_per_A: 0.05
  code:
    name: QuantumESPRESSO
    version: 7.3.1
    image: infra-qe-gpu:cc80
    mpirun: "mpirun --allow-run-as-root --bind-to none -np 1 pw.x"
    npool: 4

# ── 7. WORKFLOW (NEB smoke = endpoints relaxation only) ──
workflow:
  kind: NEB
  stage: smoke                               # smoke | production
  endpoints:
    pristine: { ref: artifacts/pristine.extxyz, E_eV: -128343.2643 }
    A:        { ref: artifacts/endA.extxyz,     E_eV: -128055.5404, fmax: 0.027, BFGS_steps: 31 }
    B:        { ref: artifacts/endB.extxyz,     E_eV: -128055.5402, fmax: 0.026, BFGS_steps: 32 }
  n_images: null                             # N/A for smoke (production has 7)
  optimizer: BFGS
  fmax_eV_per_A: 0.05
  prewrap: idpp                              # protocol erratum #5 — applied via patch #5
  paired_script: scripts/neb_canonical_pyr_96at_qe.py

# ── 8. RESULTS ───────────────────────────────────────────
results:
  endpoint_symmetry:
    dE_AB_eV: 0.0002                         # |E_A − E_B|, perfect symmetry by construction
    threshold_eV: 0.005
    pass: true
  Ea_forward_eV: null                        # smoke does not produce Ea
  status: PASS                               # endpoints paper-grade, reusable via --reuse-relaxed
  paper_quotable: false                      # smoke output not quoted directly; production E_a is
  reuse_for: production_NEB
  validated_by: [physicist@opus]
  notes: |
    Endpoints relaxed to BFGS fmax<0.03 eV/Å each.
    |E_A−E_B|=0.0002 eV = perfect symmetry (protocol design).
    Reused in production NEB v3 via --reuse-relaxed flag.
    Production v3 initial path E_a=0.164 eV in expected anchor band.

# ── 9. SANITY GATES ──────────────────────────────────────
sanity:
  - { id: G01_FeS_bond,           rule: "min(Fe–S) > 2.00 Å",                          observed: ">2.0 (PBE pyrite ~2.27)", pass: true }
  - { id: G02_NM_consistent,      rule: "no spurious magmoms (pyrite NM)",              observed: "all zero",                pass: true }
  - { id: G04_fmax_endpoints,     rule: "fmax(A,B) ≤ fmax_target",                      observed: [0.027, 0.026],            pass: true }
  - { id: G05_scf_converged,      rule: "all endpoint SCF OK",                          pass: true }
  - { id: G06_ascii_safe,         rule: "no em-dash in script (ASCII-only container)",  pass: true }
  - { id: G08_idpp_prewrap,       rule: "protocol erratum #5: idpp prewrap applied",    pass: true }
  - { id: G09_endpoint_symmetry,  rule: "|E_A − E_B| < 0.005 eV (protocol design)",     observed: 0.0002,                    pass: true }

# ── 10. PROVENANCE ───────────────────────────────────────
provenance:
