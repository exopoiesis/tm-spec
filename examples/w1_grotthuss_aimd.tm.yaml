# Pilot TM-Spec artefact #5: W1 CP2K AIMD bulk Grotthuss
# Real session: s107-s136 (RUNNING). 3×3×2 mack + 12 H2O + H+ explicit.
# Source: knowledge/handoffs/SESSION_HANDOFF_2026-05-06_s136.md (W1 step 16700+/20000, ETA ~3-4 days)
#         + paper §5b (bulk Grotthuss reference for two-regime narrative)
# Status: [DRAFT v0.1 — RUNNING, status PRELIMINARY until completion]
#
# *** NEW kind: MDCalculation ***
# Plain MD (NVT-Nose), NOT enhanced sampling.
# W2 metadyn (kind: MetaDynCalculation) and W2 US (kind: USCalculation) build on top of this trajectory.

spec: tm-spec/0.1
kind: MDCalculation
id: tm.mack_3x3x2.h_proton.aimd_grotthuss_v1.2026-04-13
schema_url: https://exopoiesis.github.io/tm-spec/0.1.json

# ── 1. STRUCTURE (3×3×2 mack — bulk Grotthuss reference) ──
structure:
  composition:
    solid:    Fe36S36                         # 3×3×2 mack supercell (72 Fe-S atoms)
    aqueous:  "12 H2O + 1 H+"                 # explicit waters + 1 excess proton
  prototype: AB_tP4_129_a_c
  space_group: { number: 129, symbol: P4/nmm }
  cell:
    a: 11.022  Å                              # 3 × 3.674
    b: 11.022  Å
    c: 13.000  Å                              # 2 × 5.033 + interlayer water
    pbc: [true, true, true]
  supercell: [3, 3, 2]
  total_atoms: 109                             # 36 Fe + 36 S + 36 H2O atoms + 1 H+
  ref: structures/mack_3x3x2_h2o12_h1.extxyz

# ── 2. DEFECTS ───────────────────────────────────────────
defects:
  reactions:
    - "nil → H_aq^+(in_water_layer) + e'(in_solid)"
  charge_balance: "+1 H_aq^+ + -1 e' (delocalized) → neutral cell"
  population:
    H_excess: { count: 1, conc: 1, location: aqueous_layer }

# ── 3. MAGNETIC STATE ────────────────────────────────────
magnetic:
  state: NM                                    # nspin=1 PM/itinerant surrogate (D-20)
  collinear: true
  propagation_vector: [0, 0, 0]
  magmoms_uB: {}
  surrogate_warning: |
    PBE nspin=1 as PM/itinerant proxy at 300 K (Q-115 DECISION-079).
    Community-validated (Q115_NOMAD_BENCHMARKS.md, D-20).

# ── 4. ENVIRONMENT ───────────────────────────────────────
environment:
  phase: aqueous_at_solid_interface             # 12 H2O explicit between mack layers
  T: 300 K
  P: explicit_water_at_density_1.0
  pH: implied_~0
  redox: null
  composition_molal: {}
  database: null

# ── 5. REACTIONS (target processes — Grotthuss in bulk water) ──
reactions:
  - id: R_grotthuss_OH_OH
    label: "OH···H⁺ → H⁺···OH (Grotthuss proton transfer)"
    rule:  "H2O···H+ ⇌ H+···H2O"
    rate:  "k_grotthuss × θ_H2O_chain"
    Ea_eV: ~0.18                                # rough estimate, Marx 2006 / Tuckerman 2010
    note: "bulk Grotthuss reference; in 3×3×1 confined system this rate drops 3-4× (kinetic trap, paper §C)"

# ── 6. CALCULATION (DFT, CP2K) ───────────────────────────
calculation:
  method: DFT
  level:
    xc: PBE+D3(BJ)
    xc_libxc: [GGA_X_PBE, GGA_C_PBE]
    vdw: D3-BJ
    basis:
      kind: gaussians
      family: GTH_MOLOPT
      cutoff_Ry: 600
      rel_cutoff_Ry: 60
    pseudopotential: GTH-PBE
    smearing: { kind: fermi, width_eV: 0.02 }
    spin: none
  code:
    name: CP2K
    version: 2024.2
    image: cp2k:desktop-cu128
    framework: "CP2K + libDBCSR + libxc"

# ── 7. MD PROTOCOL (NEW SECTION) ─────────────────────────
md_protocol:
  ensemble: NVT-nose
  thermostat:
    kind: Nose-Hoover
    T_K: 300
    tau_fs: 50
    chain_length: 3
  integrator: velocity-verlet
  timestep_fs: 0.5
  n_steps: 20000
  duration_ps: 10.0
  equilibration_ps: 1.0                          # exclude from analysis
  trajectory_freq: 10                             # write coords every 5 fs
  constraints:
    rattle: false
    fixed_atoms: []                               # all free

# ── 8. TRAJECTORY ANALYSIS (post-hoc, completed portion) ──
trajectory_analysis:
  msd:
    H_proton_msd_A2_per_ps: 3.0                   # ~3-5 typical (bulk water D_H+ ~1-2e-4 cm²/s)
    target_ps_window: [1.0, 8.0]
  diffusion_coefficient_cm2_per_s:
    H_proton: 1.5e-4                              # D_H+ post-W1_VERIFICATION s130 (verified 1.5-2e-4)
  grotthuss_hops_per_ps: 3.0                      # ~3 observed in W1 v1 11.5 ps trajectory
  hbond_lifetime_ps: 0.5                          # ~0.5 H2O-H2O typical
  speciation_fractions:
    Eigen_H3O_plus: 0.5                           # approx
    Zundel_H5O2_plus: 0.5                         # approx; W1_VERIFICATION 17-50% Zundel range

# ── 9. RESULTS ──────────────────────────────────────────
results:
  completed_ps: 8.35                              # 16700 / 20000 × 10 ps (s136)
  T_mean_K: 302.5
  T_drift_K_per_ps: 0.5                            # within phase 3 production target
  energy_drift_meV_per_ps: 0.6                     # acceptable (<1 meV/ps target)
  metrics:
    n_grotthuss_events: 25                          # ~3 hops/ps × 8.35 ps
    avg_OH_OH_distance_A: 2.6
  status: PRELIMINARY                               # RUNNING, will become PASS at 20000 steps
  paper_quotable: true                              # partial trajectory quotable for §5b reference
  validated_by: [chemist@opus, physicist@opus, math_audit_s130]
  notes: |
    Bulk Grotthuss reference for two-regime narrative (paper §C).
    In 3×3×1 mack (W2 metad) Fe-chemi traps H+ for >>kT (kinetic trap).
    In 3×3×2 mack (W1, this) bulk water Grotthuss network active → low Ea.
    Continue to 20000 steps for converged D_H+ and Zundel fraction.

# ── 10. SANITY GATES ─────────────────────────────────────
sanity:
  - { id: G01_FeS_bond,            rule: "min(Fe–S) > 2.00 Å",                                pass: true }
  - { id: G06_ascii_safe,          rule: "no em-dash in script",                              pass: true }
  - { id: G21_phase1_no_hot_start, rule: "T_mean steps 1-10 < 320 K (s107 lesson)",            pass: true }
  - { id: G22_phase2_no_T_drift,   rule: "|T_slope| < 5 K/ps over 1 ps (F-045 lesson)",        pass: true }
  - { id: G23_hill_units_explicit, rule: "no hills (plain MD); WW skip",                       pass: skip }
  - { id: G25_energy_drift,        rule: "Cons.Qty drift < 1 meV/ps",                          observed: 0.6, pass: true }
  - { id: G26_T_window,            rule: "T_mean within ±10% of T_target=300",                 observed: 302.5, pass: true }

# ── 11. PROVENANCE ───────────────────────────────────────
provenance:
  date: 2026-04-13
  author: igor@exopoiesis.space
  parents: ["s107.cp2k_aimd_initial.2026-04-13"]
  decisions: [Q-115_protocol, DECISION-079]
  literature: [Marx2006_GrotthussSurvey, Tuckerman2010_CompactBookCH4]
  compute:
    host: vast-W1
    instance: 35201165
    gpu: A100 PCIe 40G
    cost_usd: 60.0                                  # cumulative through s136
    walltime_h: 240                                  # ~10 days continuous
  hash:
    inputs:  sha256:placeholder_to_be_computed
    outputs: sha256:placeholder_to_be_computed
