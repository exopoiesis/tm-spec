# Drift fixture — pilot claims (cutoff 60, k-mesh [2,2,2], 7 images, k_spring 0.10),
# but paired_script is fixture_neb_qe_drift.py with (80 / [3,3,3] / 9 / 0.30).
# The lint tool MUST flag mismatches: error on cutoff_Ry + k-mesh, warn on n_images + k_spring.

spec: tm-spec/0.1
kind: NEBCalculation
id:   tm.fix.neb.drift.2026-01-01

structure:
  formula:    Fe32S64
  prototype:  AB2_cP12_205_a_c
  space_group: { number: 205, symbol: Pa-3 }
  supercell:  [2, 2, 2]
  pbc:        [true, true, true]

magnetic:
  state: NM
  collinear: true

calculation:
  method: DFT
  level:
    xc:    PBE
    basis: { kind: plane_waves, cutoff_Ry: 60, rho_cutoff_Ry: 240 }
    smearing: { kind: gaussian, width_Ry: 0.005 }
    spin:  none
  k_points: { mesh: [2, 2, 2] }
  code:     { name: QuantumESPRESSO, version: 7.3.1 }

workflow:
  kind:               NEB
  stage:              production
  endpoints:
    A: { ref: A.extxyz, E_eV: -100.0, fmax: 0.04 }
    B: { ref: B.extxyz, E_eV: -100.0, fmax: 0.04 }
  n_images:           7
  optimizer:          FIRE
  k_spring_eV_per_A2: 0.10
  fmax_eV_per_A:      0.05
  prewrap:            idpp
  paired_script:      tests/fixtures/scripts/fixture_neb_qe_drift.py

results:
  status:         PASS
  paper_quotable: false

sanity:
  - { id: G06_ascii_safe, rule: "no em-dash", pass: true }

provenance:
  date:    2026-01-01
  author:  test@example.com
  compute: { host: ci, cost_usd: 0.0 }
  hash:
    inputs:  sha256:placeholder_drift_pilot
    outputs: sha256:placeholder_drift_pilot
